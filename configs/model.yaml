model_type: baseline
num_channels: 8
num_classes: null
checkpoint_dir: models
classical:
  models:
    - logistic_regression
    - random_forest
  logistic_regression:
    class_weight: balanced
    max_iter: 1000
  random_forest:
    n_estimators: 200
    class_weight: balanced
    n_jobs: 1
deep:
  models:
    - cnn1d
    - tcn
  default_model: cnn1d
  input_channels: 8
  num_classes: 7
  cnn1d:
    dropout: 0.3
  tcn:
    hidden_channels: 64
    dropout: 0.2
