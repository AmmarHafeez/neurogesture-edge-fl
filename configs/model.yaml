model_type: baseline
num_channels: 8
num_classes: null
checkpoint_dir: models
classical:
  models:
    - logistic_regression
    - random_forest
  logistic_regression:
    class_weight: balanced
    max_iter: 1000
  random_forest:
    n_estimators: 200
    class_weight: balanced
    n_jobs: 1
deep:
  models:
    - cnn1d
    - tcn
  default_model: cnn1d
  input_channels: 8
  num_classes: 7
  cnn1d:
    dropout: 0.3
  tcn:
    hidden_channels: 64
    dropout: 0.2
personalization:
  base_model: cnn1d
  modes:
    - last_layer
    - full_model
edge:
  checkpoint_path: models/cnn1d_subject_split_best.pt
  fp32_onnx_path: models/onnx/cnn1d_fp32.onnx
  int8_onnx_path: models/onnx/cnn1d_int8.onnx
  input_shape:
    - 1
    - 8
    - 200
federated:
  base_model: cnn1d
  default_aggregation: fedavg
  supported_aggregations:
    - fedavg
    - fedprox
  fedavg_final_checkpoint_path: models/fedavg_cnn1d_final.pt
  fedprox_final_checkpoint_path: models/fedprox_cnn1d_final.pt
